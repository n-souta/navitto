# Deploy readme.txt and wordpress-org/* to WordPress.org (trunk + assets, and readme on stable tag).
# Requires repository secrets: SVN_USERNAME, SVN_PASSWORD (WordPress.org application password).
# See: https://github.com/10up/action-wordpress-plugin-asset-update

name: WordPress.org readme & assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'readme.txt'
      - 'wordpress-org/**'
      - '.github/workflows/wordpress-org-readme-assets.yml'

jobs:
  deploy:
    name: Deploy readme and assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-asset-update@v2.2.0
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          IGNORE_OTHER_FILES: 'true'
          ASSETS_DIR: wordpress-org
